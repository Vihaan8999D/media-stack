version: "3.8"


networks:
  mediaNetwork:
    driver: bridge


services:
  nginx:
    image: docker.io/library/nginx:latest
    container_name: nginx-proxy
    network_mode: host
    restart: unless-stopped
    volumes:
      - ~/app/config/nginx/nginx.conf:/etc/nginx/nginx.conf:Z
      - ~/app/config/nginx/html:/usr/share/nginx/html:Z

  jellyfin:
    image: docker.io/jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    userns_mode: keep-id
    networks:
      - mediaNetwork
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "127.0.0.1:8096:8096"
    volumes:
      - ~/app/config/jellyfin:/config:Z
      - ~/app/config/jellyfin-cache:/cache:Z
      - /mnt/media:/media:z
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    userns_mode: keep-id
    network_mode: host
    environment:
      - PUID=1001
      - PGID=1001
      - TZ=Asia/Kolkata
      - WEBUI_PORT=8080
    volumes:
      - ~/app/config/qbittorrent:/config:Z
      - /mnt/media:/media:z

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    userns_mode: keep-id
    networks:
      - mediaNetwork
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - PUID=1001
      - PGID=1001
      - TZ=Asia/Kolkata
    ports:
      - "127.0.0.1:7878:7878"
    volumes:
      - ~/app/config/radarr:/config:Z
      - /mnt/media:/media:z

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    userns_mode: keep-id
    networks:
      - mediaNetwork
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - PUID=1001
      - PGID=1001
      - TZ=Asia/Kolkata
    ports:
      - "127.0.0.1:8989:8989"
    volumes:
      - ~/app/config/sonarr:/config:Z
      - /mnt/media:/media:z

